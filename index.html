<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="做一个 4 题代谢状态小测试，立即开始 3 天轻负担食谱打卡挑战。"
    />
    <title>3 天轻负担食谱打卡挑战</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="campaign-shell">
      <section class="campaign-screen is-active" data-screen="landing">
        <div class="ambient-card">
          <p class="eyebrow">3-Day Metabolic Reset</p>
          <h1>测一测你的打工人饮食节奏</h1>
          <p class="hero-copy">
            4 个问题，生成你的代谢状态画像，并直接开始 3 天轻负担食谱打卡挑战。
          </p>

          <div class="hero-visual" aria-hidden="true">
            <div class="plate plate--main">
              <span>蛋白</span>
              <strong>稳</strong>
            </div>
            <div class="plate plate--side">碳水</div>
            <div class="plate plate--accent">蔬菜</div>
          </div>

          <div class="benefit-grid">
            <article>
              <span>01</span>
              <strong>不算复杂热量</strong>
              <p>用食谱结构帮你先吃稳。</p>
            </article>
            <article>
              <span>02</span>
              <strong>每天一张打卡卡</strong>
              <p>记录一餐后立刻看反馈。</p>
            </article>
            <article>
              <span>03</span>
              <strong>不靠硬饿撑住</strong>
              <p>低血糖、晚饿等状态会进入建议。</p>
            </article>
          </div>

          <button class="primary-button" id="start-quiz" type="button">立即参加打卡活动</button>
          <p class="micro-note">无需下载 App，先从今天第一餐开始。</p>
        </div>
      </section>

      <section class="campaign-screen" data-screen="quiz">
        <div class="topbar">
          <button class="text-button" id="back-to-landing" type="button">返回</button>
          <span id="quiz-progress-text"></span>
        </div>

        <div class="progress-rail">
          <span id="quiz-progress-fill"></span>
        </div>

        <section class="question-card">
          <p class="eyebrow" id="question-kicker"></p>
          <h2 id="question-title"></h2>
          <div class="answer-list" id="answer-list"></div>
        </section>
      </section>

      <section class="campaign-screen" data-screen="result">
        <div class="result-card">
          <p class="eyebrow">你的测试结果</p>
          <h2 id="persona-title"></h2>
          <p class="persona-summary" id="persona-summary"></p>

          <div class="signal-list" id="signal-list"></div>

          <section class="challenge-card">
            <div>
              <p class="eyebrow">推荐挑战</p>
              <h3 id="challenge-title"></h3>
              <p id="challenge-copy"></p>
            </div>
            <div class="challenge-days">
              <span>Day 1</span>
              <span>Day 2</span>
              <span>Day 3</span>
            </div>
          </section>

          <button class="primary-button" id="enter-checkin" type="button">开始第一天打卡</button>
          <button class="secondary-button" id="retake-quiz" type="button">重新测试</button>
        </div>
      </section>

      <section class="campaign-screen" data-screen="checkin">
        <div class="topbar">
          <button class="text-button" id="back-to-result" type="button">查看结果</button>
          <span>Day 1 / 3</span>
        </div>

        <section class="checkin-hero">
          <p class="eyebrow">今日打卡</p>
          <h2>先完成第一餐记录</h2>
          <p id="checkin-tip"></p>
        </section>

        <section class="recipe-card">
          <div class="recipe-head">
            <div>
              <p class="eyebrow">今天建议结构</p>
              <h3 id="recipe-title"></h3>
            </div>
            <span id="recipe-goal"></span>
          </div>
          <div class="macro-grid" id="macro-grid"></div>
        </section>

        <section class="checkin-card">
          <div class="section-title-row">
            <h3>选择你刚吃的这一餐</h3>
          </div>
          <div class="meal-choice-list" id="meal-choice-list"></div>
        </section>

        <section class="feedback-card" id="instant-feedback" hidden>
          <p class="eyebrow">即时反馈</p>
          <h3 id="feedback-title"></h3>
          <p id="feedback-copy"></p>
          <div class="mini-progress-list" id="feedback-progress"></div>
          <button class="primary-button" id="finish-day-one" type="button">完成今日第一餐打卡</button>
        </section>
      </section>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
